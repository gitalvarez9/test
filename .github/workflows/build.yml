runs-on: ubuntu-latest

```
steps:
  - uses: actions/checkout@v5

  - name: File generate
    run: date "+last build:%d/%m/%Y %H:%M UTC" > lastbuild.txt

  - name: Commit & push
    run: |
      git config user.name "github-actions[bot]"
      git config user.email "github-actions[bot]@users.noreply.github.com"

      git add lastbuild.txt
      git commit -m "autoupdate" || echo "nothing to commit"

      git push
```


